services:
  auto-cal:
    image: auto-cal
    container_name: auto-cal
    ports:
      - "4000:4000"
    volumes:
      - auto-cal-pgdata:/app/pgdata
    environment:
      - NODE_ENV=production
      - PORT=4000
      - PGLITE_DATA_DIR=/app/pgdata
    restart: unless-stopped

volumes:
  auto-cal-pgdata:
    driver: local
